name: Lint & Typecheck

on:
  pull_request:
    branches:
      - "**"

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.17.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
      
      - name: Run TypeScript type checking
        run: npm run typecheck
