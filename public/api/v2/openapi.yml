  "/plans":
    get:
      summary: Get a list of all plans
      description: Retrieve a list of all plans available in the Localine system.
      operationId: getPlans
      tags:
        - Plans
      responses:
        "200":
          description: A list of all plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create a new plan
      description: Create a new plan in the Localine system.
      operationId: createPlan
      tags:
        - Plans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  description: The display name of the plan.
                  example: "Unlimited"
                  maxLength: 255
                description:
                  type: string
                  description: A description for the plan to help users understand its features and limitations.
                  example: "A plan with unlimited features and limits."
                  maxLength: 500
                  nullable: true
                localesLimit:
                  type: integer
                  description: |
                    The number of locales allowed in projects under this plan.
                    A null value indicates that there is no limit on the number of locales.
                  nullable: true
                termsLimit:
                  type: integer
                  description: |
                    The number of translation terms allowed in projects under this plan.
                    A null value indicates that there is no limit on the number of translation terms.
                  nullable: true
                labelsLimit:
                  type: integer
                  description: |
                    The number of labels allowed in projects under this plan.
                    A null value indicates that there is no limit on the number of labels.
                  nullable: true
                membersLimit:
                  type: integer
                  description: |
                    The number of team members allowed in projects under this plan.
                    A null value indicates that there is no limit on the number of team members.
                  nullable: true
      responses:
        "201":
          description: The created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"
