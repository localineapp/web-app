                  description: The new key of the translation term (e.g., "welcome.message").
                  example: "welcome.message"
                  maxLength: 255
                  nullable: true
                context:
                  type: string
                  description: A new context or description for the translation term to help translators understand its usage.
                  example: "A welcome message shown on the homepage"
                  maxLength: 500
                  nullable: true
                locked:
